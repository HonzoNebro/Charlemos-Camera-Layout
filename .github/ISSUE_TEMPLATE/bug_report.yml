name: Bug report
description: Report a reproducible problem with enough context to diagnose it.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before submitting:
        - update to the latest release
        - retry with only Charlemos enabled if possible
        - include console output and the support report when available
  - type: input
    id: module_version
    attributes:
      label: Charlemos version
      description: Example: 1.5.4
      placeholder: 1.5.4
    validations:
      required: true
  - type: input
    id: foundry_version
    attributes:
      label: Foundry version
      description: Example: 13.351
      placeholder: 13.351
    validations:
      required: true
  - type: input
    id: browser_os
    attributes:
      label: Browser and operating system
      description: Example: Firefox 145 on Windows 11
      placeholder: Firefox 145 on Windows 11
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Affected user role
      options:
        - GM
        - Player
        - Both
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local Foundry install
        - Remote server
        - Both
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be explicit. Include whether the world was clean and whether other modules were enabled.
      placeholder: |
        1. Open Camera Layout Config
        2. Open Overlay Config
        3. Set overlay path to ...
        4. Click Save
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors or Charlemos logs
      description: Open the browser console, filter by `charlemos`, and paste the relevant output.
      render: shell
  - type: textarea
    id: debug_report
    attributes:
      label: Support report
      description: Open `Camera Layout Config`, click `Open Support Report`, then copy and paste the result here. The module macro/API remains available as a fallback.
      render: json
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, exported macro content, media paths, or anything else useful.
